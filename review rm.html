  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #d6e9be, #f8f6e0);
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-size: cover;
      color:#333;
      line-height: 1.6;
    }

     /* Navigation Bar */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(45deg, #3B8A3E, #2db431, #A5D6A7);
    padding: 15px 20px;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    border-radius: 0 0 25px 25px;
    animation: glow 5s infinite;
  }

  @keyframes glow {
    0% {
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }
    50% {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    100% {
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }
  }

  nav a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    margin: 0 10px;
    padding: 10px 15px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.1);
    transition: transform 0.4s, background-color 0.3s ease-in-out;
    backdrop-filter: blur(5px);
  }

  nav a:hover {
    background: rgba(255, 255, 255, 0.3);
    color: #333;
    transform: scale(1.1);
  }

  nav ul {
    list-style: none;
    display: flex;
    margin: 0;
  }

  nav img {
    width: 60px;
    height: auto;
    border-radius: 50%;
    border: 2px solid white;
    transition: transform 0.4s ease;
  }

  nav img:hover {
    transform: rotate(360deg);
  }
    /* Parallax Section */
    .parallax {
      height: 500px;
      background-attachment: fixed;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-shadow: 0px 0px 10px #000;
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
    }
  /* Footer */
  footer {
  background: linear-gradient(120deg, #3B8A3E, #4CAF50); /* Matching gradient */
  color: white;
  text-align: center;
  padding: 30px 20px;
  margin-top: 50px;
  font-size: 1em;
  box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.1); /* Subtle shadow at the top of the footer */
}

footer p {
  margin: 10px 0;
}

footer small {
  display: block;
  font-size: 0.9em;
  color: #EAF6E3;
}

footer a {
  color: #A5D6A7;
  text-decoration: none;
  font-weight: bold;
  transition: color 0.3s;
}

footer a:hover {
  color: #ffffff; /* Subtle hover effect */
}

    .translate-button {
    background: linear-gradient(45deg, #4CAF50, #A5D6A7);
    color: white;
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s, background 0.3s ease-in-out;
  }

  .translate-button:hover {
    background: #3B8A3E;
    transform: scale(1.1);
  }

    .translate-button:hover {
      background-color: #3B8A3E;
    }
     /* Scroll to Top Button */
   .scroll-to-top {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #2db431;
      color: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s;
    }

    .scroll-to-top:hover {
      background-color:  #2c642e;
    }

    .buttons-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px; /* Space between buttons */
  margin: 50px 0; /* Spacing from other sections */
}

/*  Buttons */
a.button {
  background: linear-gradient(120deg, #3B8A3E, #4CAF50); /* Matching navbar gradient */
  color: white;
  font-size: 1.2em;
  font-weight: bold;
  padding: 15px 35px;
  border: none;
  border-radius: 30px; /* Sleek pill shape */
  text-decoration: none;
  text-align: center;
  cursor: pointer;
  transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2); /* Subtle depth */
  position: relative;
  overflow: hidden;
}

/* Add an animated gradient background */
a.button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 300%;
  height: 100%;
  background: linear-gradient(120deg, #A5D6A7, #3B8A3E, #4CAF50);
  transition: left 0.4s ease;
  z-index: 0;
}

a.button:hover::before {
  left: 0; /* Gradient slides in */
}

a.button:hover {
  color: #EAF6E3; /* Subtle text color change */
  transform: translateY(-3px) scale(1.05); /* Slight upward hover effect */
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3); /* Stronger hover shadow */
}

a.button span {
  position: relative;
  z-index: 1; /* Ensure text is above gradient */
}

/* Button Active State */
a.button:active {
  transform: scale(0.98); /* Slight shrink effect on click */
  box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
}
@media (max-width: 768px) {
      nav ul {
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      nav a {
        font-size: 0.9rem;

      .parallax {

    @media (max-width: 480px) {

        padding: 5px 8px;
      }

      .parallax {
        font-size: 1.2rem;
      }

      footer {
        font-size: 0.8rem;
      }
    }
